apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-haproxy-to-external
  namespace: default
spec:
  podSelector:
    matchLabels:
      app: haproxy-egress
  policyTypes:
  - Egress
  egress:
  - to:
    - ipBlock:
        cidr: 203.0.113.45/32
    - ipBlock:
        cidr: 203.0.113.46/32
    ports:
    - protocol: TCP
      port: 443