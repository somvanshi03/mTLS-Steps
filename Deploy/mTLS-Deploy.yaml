---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: haproxy-egress
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: haproxy-egress
  template:
    metadata:
      labels:
        app: haproxy-egress
    spec:
      containers:
        - name: haproxy
          image: haproxy:2.9
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8443
          volumeMounts:
            - name: haproxy-config
              mountPath: /usr/local/etc/haproxy
            - name: mtls-certs
              mountPath: /certs
              readOnly: true
          args:
            - -f
            - /usr/local/etc/haproxy/haproxy.cfg
            - -db
      volumes:
        - name: haproxy-config
          configMap:
            name: haproxy-config
        - name: mtls-certs
          secret:
            secretName: app1-mtls-secret

---
apiVersion: v1
kind: Service
metadata:
  name: haproxy-egress
  namespace: default
spec:
  type: ClusterIP
  selector:
    app: haproxy-egress
  ports:
    - name: mtls
      port: 8443
      targetPort: 8443
